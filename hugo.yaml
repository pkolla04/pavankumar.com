baseURL: "https://pavankumar.com"
languageCode: "en-us"
title: "Pavan Kumar"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

services:
  googleAnalytics:
    id: "G-X2KSRJ82M1"

pagination:
  pagerSize: 10

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: publications
      name: Publications
      title: Publications
      url: /publications
      weight: 1
    - identifier: blog
      name: Blog
      title: Blog
      url: /blogs
      weight: 2

params:
  title: "Pavan Kumar"
  description: "Pavan Kumar - Software Architect, AI Researcher, and Technology Leader"
  favicon: "/fav.png"
  useBootstrapCDN: false
  mathjax: false
  animate: true
  customCSS: true

  theme:
    # disableThemeToggle: false
    defaultTheme: "dark"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.7
    textAlign: left

  # -- WOW FACTOR: Custom dark theme with electric accents --
  color:
    textColor: "#E2E8F0"
    secondaryTextColor: "#94A3B8"
    textLinkColor: "#00BFFF"
    backgroundColor: "#0A0A1A"
    secondaryBackgroundColor: "#0F172A"
    primaryColor: "#00BFFF"
    secondaryColor: "#111827"

    darkmode:
      textColor: "#E2E8F0"
      secondaryTextColor: "#94A3B8"
      textLinkColor: "#00BFFF"
      backgroundColor: "#0A0A1A"
      secondaryBackgroundColor: "#0F172A"
      primaryColor: "#00BFFF"
      secondaryColor: "#111827"

  navbar:
    align: ms-auto
    brandName: "Pavan Kumar"
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: true  # Enable when you add education details
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # ---------- HERO SECTION ----------
  hero:
    enable: true
    intro: "Hi, I'm"
    title: "Pavan Kumar."
    subtitle: "Software Architect | AI Researcher | Technology Leader"
    content: |-
      I design enterprise-grade systems at the intersection of cloud platforms, applied AI, and scalable architecture. Currently building intelligent automation and publishing research on how AI and cloud services can transform U.S. manufacturing.
    image: /images/hero.svg
    bottomImage:
      enable: true
    button:
      enable: false
      name: "Resume"
      url: "#"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/pavankumarkolla
        - icon: fab fa-linkedin
          url: https://linkedin.com/in/  # Add your LinkedIn URL
        - icon: fas fa-graduation-cap
          url: "#"  # Add Google Scholar URL when available

  # ---------- ABOUT SECTION ----------
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I'm a Software Architect and Technology Leader who designs and builds enterprise systems that bridge cloud platforms, AI-driven automation, and large-scale CRM architectures. My work spans the full stack of modern enterprise technology — from Salesforce platform engineering and multi-org architecture to applied AI research in manufacturing operations and cost optimization.

      My current research focuses on how AI, cloud services, and customer-operations technology platforms can reduce operational cost-to-serve and support U.S. manufacturing reshoring — a domain where enterprise software expertise meets industrial-scale impact.

      As a solo architect and product manager, I operate across the full lifecycle — from requirements and stakeholder alignment through architecture, implementation, and production deployment. This dual perspective shapes both my engineering approach (pragmatic, production-first) and my research methodology (empirical, grounded in real systems).
    skills:
      enable: true
      title: "Technologies and domains I work with:"
      items:
        - "Salesforce (Apex, LWC, Flows)"
        - "Cloud Architecture (AWS, Azure)"
        - "Python & AI/ML Pipelines"
        - "REST APIs & System Integration"
        - "Enterprise CRM Architecture"
        - "Applied AI Research"

  # ---------- EXPERIENCE SECTION ----------
  experience:
    enable: true
    items:
      - company: ""
        companyUrl: ""
        jobs:
          - name: "Senior Software Architect & Product Manager"
            date: "Present"
            content: |-
              Designing and building enterprise-grade systems across cloud platforms, Salesforce multi-org architecture, and AI-driven automation. Leading end-to-end product and engineering for mission-critical business applications.

              - Architecting multi-org Salesforce ecosystem with cross-platform integrations
              - Building AI-powered automation pipelines for operational efficiency
              - Publishing peer-reviewed research on technology-enabled manufacturing transformation
              - Full-stack product ownership from requirements through production deployment

  # ---------- EDUCATION SECTION ----------
  education:
    enable: false  # Enable when you add education details
    index: false
    items: []

  # ---------- ACHIEVEMENTS / PUBLICATIONS ----------
  achievements:
    enable: true
    title: "Publications & Research"
    items:
      - title: "Research papers coming soon"
        content: "Currently preparing manuscripts for submission to IEEE and ACM venues on AI-enabled manufacturing, cloud architecture, and enterprise platform optimization."
      # Uncomment and add as papers get published:
      # - title: "Paper Title Here"
      #   content: "Published in IEEE XYZ, 2026"
      #   url: https://doi.org/xxxxx
      #   image: /images/achievement.jpg

  # ---------- PROJECTS SECTION ----------
  projects:
    enable: true
    title: "Projects"
    items:
      - title: "Projects coming soon"
        content: "Open-source tools and research artifacts will be published here as they become available."
        badges:
          - "Coming Soon"
      # Uncomment and add as projects go public:
      # - title: "Project Name"
      #   content: "Description of the project"
      #   image: /images/projects/project.png
      #   featured:
      #     name: Demo
      #     link: https://example.com
      #   badges:
      #     - "Python"
      #     - "AI"
      #   links:
      #     - icon: fab fa-github
      #       url: https://github.com/pavankumarkolla/repo

  # ---------- CONTACT SECTION ----------
  contact:
    enable: true
    content: "Whether you want to discuss research collaboration, enterprise architecture, or just connect — my inbox is always open."
    btnName: "Email Me"
    btnLink: "mailto:"  # Add your email
    # formspree:
    #   enable: true
    #   formId: ""  # Get from formspree.io

  # ---------- FOOTER ----------
  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: false  # Enable when you have blog posts
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/pavankumarkolla
      linkedin: ""  # Add your LinkedIn URL
      # twitter:
      # instagram:

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "Pavan Kumar. All rights reserved"
    emailText: ""

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"

  customScripts: |
    <script src="/js/particles.js" defer></script>
