<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00FFD1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00FFD1;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <!-- Background circles -->
  <circle cx="250" cy="250" r="200" fill="url(#grad1)" />
  <circle cx="250" cy="250" r="150" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.5"/>
  <circle cx="250" cy="250" r="100" fill="none" stroke="url(#grad2)" stroke-width="0.5" opacity="0.3"/>
  <!-- Code brackets -->
  <text x="160" y="270" font-family="monospace" font-size="80" fill="url(#grad2)" opacity="0.8">&lt;/&gt;</text>
  <!-- Nodes / connections -->
  <circle cx="150" cy="150" r="6" fill="#00BFFF" opacity="0.6"/>
  <circle cx="350" cy="150" r="4" fill="#00FFD1" opacity="0.5"/>
  <circle cx="350" cy="350" r="5" fill="#7B68EE" opacity="0.6"/>
  <circle cx="150" cy="350" r="3" fill="#00BFFF" opacity="0.4"/>
  <line x1="150" y1="150" x2="350" y2="150" stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="350" y1="150" x2="350" y2="350" stroke="#00FFD1" stroke-width="0.5" opacity="0.3"/>
  <line x1="350" y1="350" x2="150" y2="350" stroke="#7B68EE" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="350" x2="150" y2="150" stroke="#00BFFF" stroke-width="0.5" opacity="0.3"/>
</svg>
