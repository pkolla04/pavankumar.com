{{/*
    JSON-LD Structured Data for Google Knowledge Panel
    Open Graph enhancements beyond Hugo defaults
*/}}

<!-- JSON-LD Person Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Pavan Kumar",
  "url": "{{ .Site.BaseURL }}",
  "image": "{{ .Site.BaseURL }}images/me.png",
  "jobTitle": "Software Architect & AI Researcher",
  "description": "{{ .Site.Params.description }}",
  "sameAs": [
    {{ range $i, $link := .Site.Params.hero.socialLinks.fontAwesomeIcons }}{{ if $i }},{{ end }}"{{ $link.url }}"{{ end }}
  ],
  "knowsAbout": [
    "Software Architecture",
    "Artificial Intelligence",
    "Cloud Computing",
    "Salesforce Platform",
    "Enterprise Systems",
    "Manufacturing Technology"
  ]
}
</script>

{{ if .IsHome }}
<!-- WebSite schema for sitelinks search -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Pavan Kumar",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "author": {
    "@type": "Person",
    "name": "Pavan Kumar"
  }
}
</script>
{{ end }}

{{ if eq .Section "blogs" }}
{{ if .IsPage }}
<!-- BlogPosting schema for blog posts -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ .Title }}",
  "description": "{{ .Summary | plainify | truncate 160 }}",
  "author": {
    "@type": "Person",
    "name": "Pavan Kumar",
    "url": "{{ .Site.BaseURL }}"
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "publisher": {
    "@type": "Person",
    "name": "Pavan Kumar"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
}
</script>
{{ end }}
{{ end }}

{{ if eq .Section "publications" }}
{{ if .IsPage }}
<!-- ScholarlyArticle schema for publications -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ScholarlyArticle",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.abstract | default (.Summary | plainify | truncate 300) }}",
  "author": {
    "@type": "Person",
    "name": "Pavan Kumar",
    "url": "{{ .Site.BaseURL }}"
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  {{ with .Params.doi }}"identifier": "{{ . }}",{{ end }}
  {{ with .Params.venue }}"isPartOf": { "@type": "Periodical", "name": "{{ . }}" },{{ end }}
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
}
</script>
{{ end }}
{{ end }}

<!-- Enhanced meta tags -->
<meta name="author" content="Pavan Kumar">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ .Permalink }}">
